version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: skillshare-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: classdb
      MYSQL_USER: root
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - skillshare-network

  skillshare-app:
    build: .
    container_name: skillshare-app
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/classdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
    networks:
      - skillshare-network

volumes:
  mysql_data:

networks:
  skillshare-network:
    driver: bridge