<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-wallet"></i>
                <h1>Finance Tracker</h1>
            </div>
            <nav class="nav">
                <button id="loginBtn" class="nav-btn">Login</button>
                <button id="registerBtn" class="nav-btn">Register</button>
                <button id="logoutBtn" class="nav-btn hidden">Logout</button>
            </nav>
        </header>

        <!-- Auth Forms -->
        <div id="authForms" class="auth-section">
            <!-- Login Form -->
            <div id="loginForm" class="auth-form">
                <h2>Login</h2>
                <form id="loginFormElement">
                    <div class="form-group">
                        <label for="loginUsername">Username</label>
                        <input type="text" id="loginUsername" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="auth-form hidden">
                <h2>Register</h2>
                <form id="registerFormElement">
                    <div class="form-group">
                        <label for="registerUsername">Username</label>
                        <input type="text" id="registerUsername" required>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input type="email" id="registerEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="registerFirstName">First Name</label>
                        <input type="text" id="registerFirstName" required>
                    </div>
                    <div class="form-group">
                        <label for="registerLastName">Last Name</label>
                        <input type="text" id="registerLastName" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Password</label>
                        <input type="password" id="registerPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
            </div>
        </div>

        <!-- Main Dashboard -->
        <div id="dashboard" class="dashboard hidden">
            <!-- User Info -->
            <div class="user-info">
                <h3>Welcome, <span id="userName"></span>!</h3>
                <p>Track your finances and stay on top of your budget</p>
            </div>

            <!-- Quick Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-arrow-up text-success"></i>
                    </div>
                    <div class="stat-content">
                        <h4>Total Income</h4>
                        <p id="totalIncome">$0.00</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-arrow-down text-danger"></i>
                    </div>
                    <div class="stat-content">
                        <h4>Total Expenses</h4>
                        <p id="totalExpenses">$0.00</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-chart-line text-primary"></i>
                    </div>
                    <div class="stat-content">
                        <h4>Net Amount</h4>
                        <p id="netAmount">$0.00</p>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="addTransactionBtn" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Add Transaction
                </button>
                <button id="addCategoryBtn" class="btn btn-secondary">
                    <i class="fas fa-tags"></i> Add Category
                </button>
                <button id="viewReportsBtn" class="btn btn-info">
                    <i class="fas fa-chart-bar"></i> View Reports
                </button>
            </div>

            <!-- Transaction Form -->
            <div id="transactionForm" class="modal hidden">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h3>Add Transaction</h3>
                    <form id="transactionFormElement">
                        <div class="form-group">
                            <label for="transactionDescription">Description</label>
                            <input type="text" id="transactionDescription" required>
                        </div>
                        <div class="form-group">
                            <label for="transactionAmount">Amount</label>
                            <input type="number" id="transactionAmount" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="transactionType">Type</label>
                            <select id="transactionType" required>
                                <option value="INCOME">Income</option>
                                <option value="EXPENSE">Expense</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="transactionCategory">Category</label>
                            <select id="transactionCategory" required>
                                <option value="">Select Category</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="transactionDate">Date</label>
                            <input type="date" id="transactionDate" required>
                        </div>
                        <div class="form-group">
                            <label for="transactionNotes">Notes</label>
                            <textarea id="transactionNotes" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Transaction</button>
                    </form>
                </div>
            </div>

            <!-- Category Form -->
            <div id="categoryForm" class="modal hidden">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h3>Add Category</h3>
                    <form id="categoryFormElement">
                        <div class="form-group">
                            <label for="categoryName">Category Name</label>
                            <input type="text" id="categoryName" required>
                        </div>
                        <div class="form-group">
                            <label for="categoryType">Type</label>
                            <select id="categoryType" required>
                                <option value="INCOME">Income</option>
                                <option value="EXPENSE">Expense</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="categoryDescription">Description</label>
                            <textarea id="categoryDescription" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Category</button>
                    </form>
                </div>
            </div>

            <!-- Transactions List -->
            <div class="transactions-section">
                <h3>Recent Transactions</h3>
                <div class="transactions-filters">
                    <select id="filterType">
                        <option value="">All Types</option>
                        <option value="INCOME">Income</option>
                        <option value="EXPENSE">Expense</option>
                    </select>
                    <select id="filterCategory">
                        <option value="">All Categories</option>
                    </select>
                </div>
                <div id="transactionsList" class="transactions-list">
                    <!-- Transactions will be loaded here -->
                </div>
            </div>

            <!-- Categories List -->
            <div class="categories-section">
                <h3>Categories</h3>
                <div id="categoriesList" class="categories-list">
                    <!-- Categories will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading-spinner hidden">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>

        <!-- Notification -->
        <div id="notification" class="notification hidden">
            <span id="notificationMessage"></span>
            <button class="notification-close">&times;</button>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
